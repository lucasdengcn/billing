openapi: 3.1.0
info:
  contact:
    email: dev@example.com
    name: Development Team
  description: RESTful API for billing service
  title: Billing Service API
  version: "1.0"
servers:
  - url: http://localhost:8080
    description: Generated server url
tags:
  - description: APIs for managing customer product subscriptions
    name: Subscription Management
  - description: APIs for registering and managing customer devices
    name: Device Management
  - description: APIs for tracking feature usage from devices
    name: Feature Usage Tracking
  - description: APIs for generating and managing customer bills
    name: Billing Management
  - description: Monitor and interact
    externalDocs:
      description: Spring Boot Actuator Web API Documentation
      url: https://docs.spring.io/spring-boot/docs/current/actuator-api/html/
    name: Actuator
  - description: APIs for managing customers and their profiles
    name: Customer Management
  - description: APIs for managing the service and product catalog
    name: Product Catalog
paths:
  /actuator:
    get:
      operationId: links
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/Link'
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/Link'
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
                additionalProperties:
                  type: object
                  additionalProperties:
                    $ref: '#/components/schemas/Link'
          description: OK
      summary: Actuator root web endpoint
      tags:
        - Actuator
  /actuator/health:
    get:
      operationId: health
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v2+json:
              schema:
                type: object
            application/vnd.spring-boot.actuator.v3+json:
              schema:
                type: object
          description: OK
      summary: Actuator web endpoint 'health'
      tags:
        - Actuator
  /api/bills:
    post:
      description: Generates a new billing record for a customer and period
      operationId: createBill
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BillResponse'
          description: Bill created successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid billing data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: Create a new bill
      tags:
        - Billing Management
  /api/bills/customer/{customerId}:
    get:
      description: Retrieves all bills associated with a specific customer
      operationId: getCustomerBills
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BillResponse'
          description: Successfully retrieved bills
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: List customer bills
      tags:
        - Billing Management
  /api/bills/{id}:
    get:
      description: Retrieves details of a specific bill
      operationId: getBill
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/BillResponse'
          description: Bill found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Bill not found
      summary: Get bill by ID
      tags:
        - Billing Management
  /api/customers:
    get:
      description: Retrieves a complete list of all registered customers
      operationId: getAllCustomers
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerResponse'
          description: Successfully retrieved list
      summary: List all customers
      tags:
        - Customer Management
    post:
      description: Registers a new customer in the system
      operationId: createCustomer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CustomerResponse'
          description: Customer created successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
      summary: Create a new customer
      tags:
        - Customer Management
  /api/customers/{id}:
    delete:
      description: Removes a customer's record from the system
      operationId: deleteCustomer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Customer deleted successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: Delete a customer
      tags:
        - Customer Management
    get:
      description: Retrieves a single customer's details by their unique database ID
      operationId: getCustomer
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/CustomerResponse'
          description: Customer found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: Get customer by ID
      tags:
        - Customer Management
  /api/devices:
    get:
      description: Retrieves a complete list of all registered devices
      operationId: getAllDevices
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceResponse'
          description: Successfully retrieved list
      summary: List all devices
      tags:
        - Device Management
    post:
      description: Registers a hardware device and optionally creates/resolves its owner
      operationId: createDevice
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceRegisterRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DeviceResponse'
          description: Device registered successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request or customer data
      summary: Register a new device
      tags:
        - Device Management
  /api/devices/activate/{deviceNo}:
    post:
      description: Activates a device and updates its last activity timestamp using its unique hardware number
      operationId: activateDevice
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DeviceResponse'
          description: Device activated successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device not found
      summary: Activate a device by number
      tags:
        - Device Management
  /api/devices/batch:
    post:
      description: Registers multiple devices for a single customer (new or existing)
      operationId: batchCreateDevices
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceBatchRegisterRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceResponse'
          description: Devices registered successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request or customer data
      summary: Batch register devices
      tags:
        - Device Management
  /api/devices/customer/{customerId}:
    get:
      description: Retrieves all devices associated with a specific customer
      operationId: getCustomerDevices
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceResponse'
          description: Successfully retrieved devices
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: List customer devices
      tags:
        - Device Management
  /api/devices/deactivate/{deviceNo}:
    patch:
      description: Deactivates a device using its unique device number
      operationId: deactivateDeviceByNo
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DeviceResponse'
          description: Device deactivated successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device not found
      summary: Deactivate device by device number
      tags:
        - Device Management
  /api/devices/{id}:
    get:
      description: Retrieves a device by its database identifier
      operationId: getDeviceById
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DeviceResponse'
          description: Device found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device not found
      summary: Get device by ID
      tags:
        - Device Management
    put:
      description: Updates device details such as name, type, and status
      operationId: updateDevice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/DeviceResponse'
          description: Device updated successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device not found
      summary: Update an existing device
      tags:
        - Device Management
  /api/feature/usage:
    post:
      description: Tracks usage of a specific feature from a device identified by device number
      operationId: trackFeatureUsage
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureUsageTrackingRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: Feature usage tracked successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device, Product, or Feature not found
      summary: Track feature usage
      tags:
        - Feature Usage Tracking
  /api/feature/usage/device/{deviceNo}:
    get:
      description: Retrieves all feature usage logs for a specific device
      operationId: getFeatureUsageLogsByDevice
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
        - in: query
          name: pageable
          required: true
          schema:
            $ref: '#/components/schemas/Pageable'
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageFeatureAccessLog'
          description: Feature usage logs retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No usage logs found for the specified device
      summary: Get feature usage logs by device
      tags:
        - Feature Usage Tracking
  /api/feature/usage/device/{deviceNo}/product/{productNo}/feature/{featureNo}:
    get:
      description: Retrieves feature usage logs for a specific device, product, and feature combination
      operationId: getFeatureUsageLogs
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
        - in: path
          name: productNo
          required: true
          schema:
            type: string
        - in: path
          name: featureNo
          required: true
          schema:
            type: string
        - in: query
          name: pageable
          required: true
          schema:
            $ref: '#/components/schemas/Pageable'
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageFeatureAccessLog'
          description: Feature usage logs retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No usage logs found for the specified combination
      summary: Get feature usage logs by device, product, and feature
      tags:
        - Feature Usage Tracking
  /api/feature/usage/subscription/{subscriptionId}:
    get:
      description: Retrieves all feature usage logs for a specific subscription
      operationId: getFeatureUsageLogsBySubscription
      parameters:
        - in: path
          name: subscriptionId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: pageable
          required: true
          schema:
            $ref: '#/components/schemas/Pageable'
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageFeatureAccessLog'
          description: Feature usage logs retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No usage logs found for the specified subscription
      summary: Get feature usage logs by subscription
      tags:
        - Feature Usage Tracking
  /api/feature/usage/trackId/{trackId}:
    get:
      description: Retrieves all feature usage logs for a specific subscription feature identified by track ID
      operationId: getFeatureUsageLogsByTrackId
      parameters:
        - in: path
          name: trackId
          required: true
          schema:
            type: string
        - in: query
          name: pageable
          required: true
          schema:
            $ref: '#/components/schemas/Pageable'
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/PageFeatureAccessLog'
          description: Feature usage logs retrieved successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: No usage logs found for the specified track ID
      summary: Get feature usage logs by track ID
      tags:
        - Feature Usage Tracking
  /api/feature/usage/{trackId}:
    post:
      description: Tracks usage of a specific feature identified by track ID
      operationId: trackFeatureUsageByTrackId
      parameters:
        - in: path
          name: trackId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeatureUsageTrackingByTrackIdRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: Feature usage tracked successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription feature not found
      summary: Track feature usage by track ID
      tags:
        - Feature Usage Tracking
  /api/products:
    get:
      description: Retrieves details of a specific product by its product number
      operationId: getAllProducts
      parameters:
        - in: query
          name: productNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductResponse'
          description: Product found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Product not found
      summary: Get product by product number
      tags:
        - Product Catalog
    post:
      description: Adds a new product or service plan to the catalog
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProductResponse'
          description: Product created successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid product data
      summary: Create a new product
      tags:
        - Product Catalog
  /api/products/features/{featureId}:
    delete:
      description: Deletes an existing product feature
      operationId: deleteProductFeature
      parameters:
        - in: path
          name: featureId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Feature deleted successfully
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Feature not found
      summary: Delete a product feature
      tags:
        - Product Catalog
    put:
      description: Updates an existing product feature
      operationId: updateProductFeature
      parameters:
        - in: path
          name: featureId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductFeatureRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProductFeatureResponse'
          description: Feature updated successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid feature data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Feature not found
      summary: Update a product feature
      tags:
        - Product Catalog
  /api/products/{id}:
    get:
      description: Retrieves details of a specific product by its ID
      operationId: getProduct
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProductResponse'
          description: Product found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Product not found
      summary: Get product by ID
      tags:
        - Product Catalog
    put:
      description: Updates an existing product in the catalog
      operationId: updateProduct
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProductResponse'
          description: Product updated successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid product data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Product not found
      summary: Update a product
      tags:
        - Product Catalog
  /api/products/{productId}/features:
    get:
      description: Retrieves all features associated with a specific product
      operationId: getProductFeatures
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductFeatureResponse'
          description: Successfully retrieved product features
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Product not found
      summary: Get features of a product
      tags:
        - Product Catalog
  /api/products/{productId}/features/bulk:
    post:
      description: Adds a list of new features to an existing product
      operationId: addFeaturesToProduct
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductFeatureRequestBulk'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductFeatureResponse'
          description: Features added successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid feature data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Product not found
      summary: Add multiple features to product
      tags:
        - Product Catalog
  /api/subscriptions:
    post:
      description: Subscribes a customer to a specific product, linked to a device
      operationId: createSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
          description: Subscription created successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer, Product, or Device not found
      summary: Create a subscription
      tags:
        - Subscription Management
  /api/subscriptions/cancel:
    post:
      description: Cancels a subscription identified by customer ID, device ID, and product ID
      operationId: cancelSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelSubscriptionRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
          description: Subscription cancelled successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request data
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription not found
      summary: Cancel a subscription
      tags:
        - Subscription Management
  /api/subscriptions/customer/{customerId}:
    get:
      description: Retrieves all subscriptions for a specific customer
      operationId: getCustomerSubscriptions
      parameters:
        - in: path
          name: customerId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionResponse'
          description: Successfully retrieved subscriptions
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Customer not found
      summary: List customer subscriptions
      tags:
        - Subscription Management
  /api/subscriptions/device/{deviceNo}:
    get:
      description: Retrieves all subscriptions associated with a specific device number
      operationId: getSubscriptionsByDeviceNo
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SubscriptionResponse'
          description: Successfully retrieved subscriptions
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Device not found
      summary: List subscriptions by device number
      tags:
        - Subscription Management
  /api/subscriptions/device/{deviceNo}/product/{productNo}:
    get:
      description: Retrieves a subscription associated with a specific device number and product number
      operationId: getSubscriptionByDeviceNoAndProductNo
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
        - in: path
          name: productNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionWithFeaturesResponse'
          description: Subscription found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription not found
      summary: Get subscription by device number and product number
      tags:
        - Subscription Management
  /api/subscriptions/device/{deviceNo}/product/{productNo}/feature/{featureNo}:
    get:
      description: Retrieves a subscription feature associated with a specific device number, product number, and feature number
      operationId: getSubscriptionFeatureByDeviceNoFeatureNoAndProductNo
      parameters:
        - in: path
          name: deviceNo
          required: true
          schema:
            type: string
        - in: path
          name: featureNo
          required: true
          schema:
            type: string
        - in: path
          name: productNo
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionFeatureResponse'
          description: Subscription feature found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription feature not found
      summary: Get subscription feature by device number, product number, and feature number
      tags:
        - Subscription Management
  /api/subscriptions/renew:
    post:
      description: Renews a subscription based on the provided renewal request
      operationId: renewSubscription
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscriptionRenewalRequest'
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
          description: Subscription renewed successfully
        "400":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
          description: Invalid request or subscription cannot be renewed
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription not found
      summary: Renew subscription with renewal request
      tags:
        - Subscription Management
  /api/subscriptions/{id}:
    get:
      description: Retrieves details of a specific subscription
      operationId: getSubscription
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/SubscriptionResponse'
          description: Subscription found
        "404":
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Subscription not found
      summary: Get subscription by ID
      tags:
        - Subscription Management
components:
  schemas:
    BillRequest:
      type: object
      description: Request model for generating or updating a bill
      properties:
        baseFees:
          type: number
          description: Total base subscription fees for the period
          example: "29.99"
          minimum: 0.0
        billingPeriodEnd:
          type: string
          format: date
          description: End date of the billing period
          example: "2026-03-31"
        billingPeriodStart:
          type: string
          format: date
          description: Start date of the billing period
          example: "2026-03-01"
        customerId:
          type: integer
          format: int64
          description: ID of the customer being billed
          example: 1
        paymentStatus:
          type: string
          description: Current payment state of the bill
          enum:
            - "0"
            - "1"
            - "2"
            - "3"
          example: PENDING
        usageFees:
          type: number
          description: Variable usage-based fees for the period
          example: "5.50"
          minimum: 0.0
      required:
        - billingPeriodEnd
        - billingPeriodStart
        - customerId
    BillResponse:
      type: object
      description: Response model representing a generated bill
      properties:
        baseFees:
          type: number
          description: Total base subscription fees
          example: "29.99"
        billingPeriodEnd:
          type: string
          format: date
          description: End date of the billing period
          example: "2026-03-31"
        billingPeriodStart:
          type: string
          format: date
          description: Start date of the billing period
          example: "2026-03-01"
        customerId:
          type: integer
          format: int64
          description: ID of the customer
          example: 1
        id:
          type: integer
          format: int64
          description: Unique database identifier for the bill
          example: 1
        paidAt:
          type: string
          format: date-time
          description: Timestamp when the bill was fully paid
        paymentStatus:
          type: string
          description: Current payment state
          enum:
            - "0"
            - "1"
            - "2"
            - "3"
          example: PAID
        totalFees:
          type: number
          description: Sum of base and usage fees
          example: "35.49"
        usageFees:
          type: number
          description: Total usage-based variable fees
          example: "5.50"
    CancelSubscriptionRequest:
      type: object
      description: Request model for canceling a subscription
      properties:
        customerId:
          type: integer
          format: int64
          description: ID of the customer whose subscription should be canceled
          example: 1
        deviceId:
          type: integer
          format: int64
          description: ID of the device associated with the subscription
          example: 1
        productId:
          type: integer
          format: int64
          description: ID of the product associated with the subscription
          example: 1
      required:
        - customerId
        - deviceId
        - productId
    CustomerInfo:
      type: object
      description: Customer information for lookup or creation within a request
      properties:
        customerNo:
          type: string
          description: Customer business number
          example: CUST-001
          maxLength: 50
          minLength: 0
          pattern: ^[A-Z]{2,4}-\d{6,12}$
        id:
          type: integer
          format: int64
          description: ID of an existing customer
          example: 1
        mobileNo:
          type: string
          description: Customer mobile number
          example: "+8613800000000"
          pattern: ^\+?[1-9]\d{1,14}$
        name:
          type: string
          description: Customer name (required for new customers)
          example: John Doe
          maxLength: 255
          minLength: 0
        wechatId:
          type: string
          description: Customer WeChat ID
          example: wx_john
          maxLength: 255
          minLength: 0
    CustomerRequest:
      type: object
      description: Request model for creating or updating a customer
      properties:
        customerNo:
          type: string
          description: Unique customer number
          example: CUST-2026-001
          maxLength: 50
          minLength: 0
          pattern: ^[A-Z]{2,4}-\d{6,12}$
        mobileNo:
          type: string
          description: Mobile number for contact
          example: "+8613800000000"
          pattern: ^\+?[1-9]\d{1,14}$
        name:
          type: string
          description: Customer's full name
          example: John Doe
          maxLength: 255
          minLength: 2
        wechatId:
          type: string
          description: WeChat ID for communication
          example: wx_12345
          maxLength: 255
          minLength: 0
      required:
        - name
    CustomerResponse:
      type: object
      description: Response model representing a customer's details
      properties:
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created
        customerNo:
          type: string
          description: Unique customer number
          example: CUST-2026-001
        id:
          type: integer
          format: int64
          description: Unique database identifier for the customer
          example: 1
        mobileNo:
          type: string
          description: Mobile number
          example: "+8613800000000"
        name:
          type: string
          description: Customer's full name
          example: John Doe
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the record was last updated
        wechatId:
          type: string
          description: WeChat ID
          example: wx_12345
    DeviceBatchRegisterRequest:
      type: object
      description: Request model for registering multiple devices for a single customer
      properties:
        customer:
          $ref: '#/components/schemas/CustomerInfo'
          description: Customer information for lookup or creation
        devices:
          type: array
          description: List of devices to be registered for the customer
          items:
            $ref: '#/components/schemas/DeviceUpdateRequest'
          minItems: 1
      required:
        - customer
        - devices
    DeviceRegisterRequest:
      type: object
      description: Request model for registering a new device
      properties:
        customer:
          $ref: '#/components/schemas/CustomerInfo'
          description: Customer information for lookup or creation
        deviceName:
          type: string
          description: Friendly name for the device
          example: iPhone 15 Pro
          maxLength: 255
          minLength: 0
        deviceNo:
          type: string
          description: Unique identifier for the hardware device
          example: HW-12345678
          maxLength: 255
          minLength: 0
          pattern: ^[A-Z]{2,4}-\d{6,12}$
        deviceType:
          type: string
          description: Type of device
          example: MOBILE
          maxLength: 50
          minLength: 0
        status:
          type: string
          description: Current status of the device
          enum:
            - "0"
            - "3"
            - "1"
            - "2"
          example: ACTIVE
      required:
        - deviceNo
        - status
    DeviceResponse:
      type: object
      description: Response model representing a registered device
      properties:
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the device was created
        deviceName:
          type: string
          description: Friendly name for the device
          example: iPhone 15 Pro
        deviceNo:
          type: string
          description: Unique hardware identifier
          example: HW-12345678
        deviceType:
          type: string
          description: Device hardware or platform type
          example: MOBILE
        id:
          type: integer
          format: int64
          description: Unique database identifier for the device
          example: 1
        lastActivityAt:
          type: string
          format: date-time
          description: Timestamp of the last recorded activity from this device
        status:
          type: string
          description: Current activation status of the device
          enum:
            - "0"
            - "3"
            - "1"
            - "2"
          example: ACTIVE
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the device was last updated
    DeviceUpdateRequest:
      type: object
      description: Request model for updating an existing device
      properties:
        deviceName:
          type: string
          description: Friendly name for the device
          example: iPhone 15 Pro
          maxLength: 255
          minLength: 0
        deviceNo:
          type: string
          description: Unique identifier for the hardware device
          example: HW-12345678
          maxLength: 255
          minLength: 0
          pattern: ^[A-Z]{2,4}-\d{6,12}$
        deviceType:
          type: string
          description: Type of device
          example: MOBILE
          maxLength: 50
          minLength: 0
        status:
          type: string
          description: Current status of the device
          enum:
            - "0"
            - "3"
            - "1"
            - "2"
          example: ACTIVE
      required:
        - deviceNo
        - status
    ErrorResponse:
      type: object
      description: Response model for general API errors (e.g., 404, 500)
      properties:
        message:
          type: string
          description: Error message
          example: Resource not found
        path:
          type: string
          description: Path where the error occurred
          example: /api/customers/999
        status:
          type: integer
          format: int32
          description: HTTP Status code
          example: 404
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error
    FeatureAccessLog:
      type: object
      properties:
        accessTime:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        detailValue:
          type: string
        deviceId:
          type: integer
          format: int64
        id:
          type: integer
          format: int64
        productFeatureId:
          type: integer
          format: int64
        subscriptionId:
          type: integer
          format: int64
        usageAmount:
          type: integer
          format: int32
    FeatureUsageTrackingByTrackIdRequest:
      type: object
      description: Request model for tracking feature usage from a device using track ID
      properties:
        detailValue:
          type: string
          description: Access detail value
        usageAmount:
          type: integer
          format: int32
          default: 1
          description: Amount of usage to track
          example: 1
          minimum: 1
    FeatureUsageTrackingRequest:
      type: object
      description: Request model for tracking feature usage from a device
      properties:
        detailValue:
          type: string
          description: Access detail value
        deviceNo:
          type: string
          description: Device number to identify the device
          example: DEV001
          maxLength: 255
          minLength: 0
          pattern: ^[A-Z]{2,4}-\d{6,12}$
        featureNo:
          type: string
          description: Feature number to identify the feature being used
          example: FEATURE001
          maxLength: 50
          minLength: 2
          pattern: ^[A-Z0-9_-]+$
        productNo:
          type: string
          description: Product number to identify the product
          example: PROD001
          maxLength: 50
          minLength: 2
          pattern: ^[A-Z0-9_-]+$
        usageAmount:
          type: integer
          format: int32
          default: 1
          description: Amount of usage to track
          example: 1
          minimum: 1
      required:
        - deviceNo
        - featureNo
        - productNo
    Link:
      type: object
      properties:
        href:
          type: string
        templated:
          type: boolean
    PageFeatureAccessLog:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/FeatureAccessLog'
        empty:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        number:
          type: integer
          format: int32
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: '#/components/schemas/PageableObject'
        size:
          type: integer
          format: int32
        sort:
          $ref: '#/components/schemas/SortObject'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
          minimum: 0
        size:
          type: integer
          format: int32
          minimum: 1
        sort:
          type: array
          items:
            type: string
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        sort:
          $ref: '#/components/schemas/SortObject'
        unpaged:
          type: boolean
    ProductFeatureRequest:
      type: object
      description: Request model for creating or updating a product feature
      properties:
        description:
          type: string
          description: Description of the feature
          example: Provides access to the API with rate limiting
          maxLength: 1000
          minLength: 0
        featureNo:
          type: string
          description: Unique identifier for the feature
          example: FEAT_0001
          maxLength: 50
          minLength: 2
          pattern: ^[A-Z0-9_-]+$
        featureType:
          type: string
          description: Type of the feature
          enum:
            - api_access
            - storage_space
            - support_level
            - bandwidth_limit
            - user_limit
            - customization
            - integration
            - analytics
            - security
            - backup
            - monitoring
            - token
            - credit
            - other
          example: API_ACCESS
        productId:
          type: integer
          format: int64
          description: ID of the parent product
          example: 1
        quota:
          type: integer
          format: int32
          description: Quota limit for the feature
          example: 1000
          maximum: 999999999
          minimum: 0
        title:
          type: string
          description: Title of the product feature
          example: API Access
          maxLength: 255
          minLength: 2
      required:
        - featureNo
        - featureType
        - productId
        - quota
        - title
    ProductFeatureRequestBulk:
      type: object
      description: Request model for creating or updating product feature in bulk
      properties:
        items:
          type: array
          description: List of product feature requests
          items:
            $ref: '#/components/schemas/ProductFeatureRequest'
    ProductFeatureResponse:
      type: object
      description: Response model representing a product feature
      properties:
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the feature was created
        description:
          type: string
          description: Description of the feature
          example: Provides access to the API with rate limiting
        featureType:
          type: string
          description: Type of the feature
          enum:
            - api_access
            - storage_space
            - support_level
            - bandwidth_limit
            - user_limit
            - customization
            - integration
            - analytics
            - security
            - backup
            - monitoring
            - token
            - credit
            - other
          example: API_ACCESS
        id:
          type: integer
          format: int64
          description: Unique database identifier for the feature
          example: 1
        productId:
          type: integer
          format: int64
          description: ID of the parent product
          example: 1
        quota:
          type: integer
          format: int32
          description: Quota limit for the feature
          example: 1000
        title:
          type: string
          description: Title of the product feature
          example: API Access
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the feature was last updated
    ProductRequest:
      type: object
      description: Request model for creating or updating a product
      properties:
        basePrice:
          type: number
          description: Standard price before any discounts
          example: "29.99"
          minimum: 0.0
        description:
          type: string
          description: JSON description of the product
          example:
            tier: premium
            support: 24/7
        discountRate:
          type: number
          description: Discount rate applied to base price (1.0 = no discount), fee = basePrice * discountRate
          example: "0.90"
          maximum: 1.0
          minimum: 0.0
        discountStatus:
          type: string
          description: Whether a discount is currently active for this product
          enum:
            - "0"
            - "1"
          example: "1"
        priceType:
          type: string
          description: Type of pricing model for the product
          enum:
            - monthly
            - yearly
            - one_time
            - usage_based
            - custom
          example: MONTHLY
        productNo:
          type: string
          description: Unique product number identifier
          example: PREMIUM_PLAN_001
          maxLength: 50
          minLength: 2
          pattern: ^[A-Z0-9_-]+$
        title:
          type: string
          description: Title of the service/product
          example: Premium Plan
          maxLength: 255
          minLength: 2
      required:
        - basePrice
        - priceType
        - productNo
        - title
    ProductResponse:
      type: object
      description: Response model representing a service or product
      properties:
        basePrice:
          type: number
          description: Base price amount
          example: "29.99"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the product was added to the catalog
        description:
          type: string
          description: Product metadata and description in JSON
          example:
            tier: premium
        discountRate:
          type: number
          description: Active discount rate
          example: "0.90"
        discountStatus:
          type: string
          description: Whether a discount is active
          enum:
            - "0"
            - "1"
          example: ACTIVE
        id:
          type: integer
          format: int64
          description: Unique database identifier for the product
          example: 1
        priceType:
          type: string
          description: Type of pricing model for the product
          enum:
            - monthly
            - yearly
            - one_time
            - usage_based
            - custom
          example: MONTHLY
        productNo:
          type: string
          description: Unique product number identifier
          example: PREMIUM_PLAN_001
        title:
          type: string
          description: Product title
          example: Premium Plan
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
    SubscriptionFeatureResponse:
      type: object
      description: Response model representing a subscription feature
      properties:
        accessed:
          type: integer
          format: int32
          description: Number of accesses made to this feature
          example: 150
        balance:
          type: integer
          format: int32
          description: Remaining balance/available quota
          example: 850
        balanceSufficient:
          type: boolean
          description: Indicates whether the balance is sufficient (balance > 0)
          example: true
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the subscription feature was created
        description:
          type: string
          description: Description of the feature
          example: Provides access to the API with rate limiting
        deviceId:
          type: integer
          format: int64
          description: ID of the associated device (if any)
          example: 1
        featureType:
          type: string
          description: Type of the feature
          enum:
            - api_access
            - storage_space
            - support_level
            - bandwidth_limit
            - user_limit
            - customization
            - integration
            - analytics
            - security
            - backup
            - monitoring
            - token
            - credit
            - other
          example: api_access
        id:
          type: integer
          format: int64
          description: Unique database identifier for the subscription feature
          example: 1
        productFeatureId:
          type: integer
          format: int64
          description: ID of the original product feature
          example: 1
        quota:
          type: integer
          format: int32
          description: Quota limit for the feature
          example: 1000
        subscriptionId:
          type: integer
          format: int64
          description: ID of the parent subscription
          example: 1
        title:
          type: string
          description: Title of the subscription feature
          example: API Access
        trackId:
          type: string
          description: Globally unique track ID for this subscription feature
          example: 01hjdz4vg7jyqrxp8mn89p9xsc
    SubscriptionRenewalRequest:
      type: object
      description: Request model for subscription renewal
      properties:
        deviceNo:
          type: string
          description: Device number
          example: DEV001
          minLength: 1
        productNo:
          type: string
          description: Product number
          example: PROD001
          minLength: 1
        renewalPeriodUnit:
          type: string
          default: months
          description: Unit of renewal period
          enum:
            - days
            - weeks
            - months
            - years
          example: months
        renewalPeriods:
          type: integer
          format: int32
          default: 1
          description: Number of renewal periods
          example: 1
      required:
        - deviceNo
        - productNo
        - renewalPeriods
    SubscriptionRequest:
      type: object
      description: Request model for creating a new subscription
      properties:
        customerId:
          type: integer
          format: int64
          description: ID of the subscribing customer
          example: 1
        deviceId:
          type: integer
          format: int64
          description: ID of the primary device for this subscription
          example: 1
        endDate:
          type: string
          format: date-time
          description: When the subscription expires
          example: "2027-03-16T00:00:00Z"
        productId:
          type: integer
          format: int64
          description: ID of the product to subscribe to
          example: 1
        startDate:
          type: string
          format: date-time
          description: When the subscription begins
          example: "2026-03-16T00:00:00Z"
      required:
        - customerId
        - deviceId
        - productId
    SubscriptionResponse:
      type: object
      description: Response model representing a customer's subscription
      properties:
        baseFee:
          type: number
          description: Base fee at subscription time
          example: "29.99"
        customerId:
          type: integer
          format: int64
          description: ID of the customer
          example: 1
        deviceId:
          type: integer
          format: int64
          description: ID of the primary device (if any)
          example: 1
        discountRate:
          type: number
          description: Locked-in discount rate
          example: "0.90"
        endDate:
          type: string
          format: date-time
          description: Expiry date
        id:
          type: integer
          format: int64
          description: Unique database identifier for the subscription
          example: 1
        periodUnit:
          type: string
          description: Unit of subscription period
          enum:
            - days
            - weeks
            - months
            - years
          example: MONTHS
        productId:
          type: integer
          format: int64
          description: ID of the subscribed product
          example: 1
        startDate:
          type: string
          format: date-time
          description: Activation date
        status:
          type: integer
          format: int32
          description: Current lifecycle status of the subscription
          enum:
            - 0
            - 1
            - 2
            - 3
          example: ACTIVE
        totalFee:
          type: number
          description: Total fee (baseFee * discountRate * periods)
          example: "26.99"
    SubscriptionWithFeaturesResponse:
      type: object
      description: Response model representing a subscription with its associated features
      properties:
        baseFee:
          type: number
          description: Base fee at subscription time
          example: "29.99"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the subscription was created
        customerId:
          type: integer
          format: int64
          description: ID of the customer
          example: 1
        deviceId:
          type: integer
          format: int64
          description: ID of the primary device (if any)
          example: 1
        discountRate:
          type: number
          description: Locked-in discount rate
          example: "0.90"
        endDate:
          type: string
          format: date-time
          description: Expiry date
        id:
          type: integer
          format: int64
          description: Unique database identifier for the subscription
          example: 1
        periodUnit:
          type: string
          description: Unit of subscription period
          enum:
            - days
            - weeks
            - months
            - years
          example: MONTHS
        productId:
          type: integer
          format: int64
          description: ID of the subscribed product
          example: 1
        startDate:
          type: string
          format: date-time
          description: Activation date
        status:
          type: integer
          format: int32
          description: Current lifecycle status of the subscription
          enum:
            - 0
            - 1
            - 2
            - 3
          example: ACTIVE
        subscriptionFeatures:
          $ref: '#/components/schemas/SubscriptionFeatureResponse'
          description: List of features associated with this subscription
        totalFee:
          type: number
          description: Total fee (baseFee * discountRate * periods)
          example: "26.99"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the subscription was last updated
    ValidationErrorResponse:
      type: object
      description: Response model for validation errors (400 Bad Request)
      properties:
        errors:
          type: object
          additionalProperties:
            type: string
          description: Detailed field-level validation errors
        message:
          type: string
          description: Overall error message
          example: Validation failed
        path:
          type: string
          description: Path where the error occurred
          example: /api/customers
        status:
          type: integer
          format: int32
          description: HTTP Status code
          example: 400
        timestamp:
          type: string
          format: date-time
          description: Timestamp of the error
