    ProductRequest:
      type: object
      description: Request model for creating or updating a product
      properties:
        basePrice:
          type: number
          description: Standard price before any discounts
          example: "29.99"
          minimum: 0.0
        description:
          type: string
          description: JSON description of the product
          example:
            tier: premium
            support: 24/7
        discountRate:
          type: number
          description: Discount rate applied to base fee (1.0 = no discount)
          example: "0.90"
          minimum: 0.0
        discountStatus:
          type: string
          description: Whether a discount is currently active for this product
          enum:
            - INACTIVE
            - ACTIVE
          example: ACTIVE
        title:
          type: string
          description: Title of the service/product
          example: Premium Plan
          maxLength: 255
          minLength: 2
      required:
        - basePrice
        - title
    ProductResponse:
      type: object
      description: Response model representing a service or product
      properties:
        basePrice:
          type: number
          description: Base price amount
          example: "29.99"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the product was added to the catalog
        description:
          type: string
          description: Product metadata and description in JSON
          example:
            tier: premium
        discountRate:
          type: number
          description: Active discount rate
          example: "0.90"
        discountStatus:
          type: string
          description: Whether a discount is active
          enum:
            - INACTIVE
            - ACTIVE
          example: ACTIVE
        id:
          type: integer
          format: int64
          description: Unique database identifier for the product
          example: 1
        title:
          type: string
          description: Product title
          example: Premium Plan
    SubscriptionRequest:
      type: object
      description: Request model for creating a new subscription
      properties:
        baseFee:
          type: number
          description: Base fee at time of subscription
          example: "29.99"
          minimum: 0.0
        customerId:
          type: integer
          format: int64
          description: ID of the subscribing customer
          example: 1
        deviceId:
          type: integer
          format: int64
          description: Optional ID of the primary device for this subscription
          example: 1
        discountRate:
          type: number
          description: Applied discount rate
          example: "0.90"
          minimum: 0.0
        endDate:
          type: string
          format: date-time
          description: When the subscription expires
          example: "2027-03-16T00:00:00Z"
        periodDays:
          type: integer
          format: int32
          description: Duration of the subscription in days
          example: 365
          minimum: 1
        productId:
          type: integer
          format: int64
          description: ID of the product to subscribe to
          example: 1
        startDate:
          type: string
          format: date-time
          description: When the subscription begins
          example: "2026-03-16T00:00:00Z"
        status:
          type: string
          description: Current state of the subscription
          enum:
            - PENDING
            - ACTIVE
            - CANCELLED
            - EXPIRED
          example: ACTIVE
      required:
        - customerId
        - periodDays
        - productId
        - startDate
    SubscriptionResponse:
      type: object
      description: Response model representing a customer's subscription
      properties:
        baseFee:
          type: number
          description: Base fee at subscription time
          example: "29.99"
        customerId:
          type: integer
          format: int64
          description: ID of the customer
          example: 1
        deviceId:
          type: integer
          format: int64
          description: ID of the primary device (if any)
          example: 1
        discountRate:
          type: number
          description: Locked-in discount rate
          example: "0.90"
        endDate:
          type: string
          format: date-time
          description: Expiry date
        id:
          type: integer
          format: int64
          description: Unique database identifier for the subscription
          example: 1
        periodDays:
          type: integer
          format: int32
          description: Subscription period in days
          example: 365
        productId:
          type: integer
          format: int64
          description: ID of the subscribed product
          example: 1
        startDate:
          type: string
          format: date-time
          description: Activation date
        status:
          type: string
          description: Current lifecycle status of the subscription
          enum:
            - PENDING
            - ACTIVE
            - CANCELLED
            - EXPIRED
          example: ACTIVE
        totalFee:
          type: number
