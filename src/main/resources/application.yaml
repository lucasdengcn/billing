spring:
  application:
    name: billing-service
  jackson:
    # use-jackson2-defaults: true
    serialization:
      fail-on-empty-beans: false
      #write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: false      # Ignore unknown JSON fields
      accept-empty-string-as-null-object: true  # Treat "" as null
  # Database Configuration
#  datasource:
#    url: jdbc:postgresql://localhost:5432/billing
#    username: postgres
#    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration

# Logging Configuration
logging:
  level:
    com.github.lucasdengcn.billing: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
